<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRACK IT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f5f7;
height:100vh;
overflow:hidden;
}

/* Layout */

.wrapper{
display:flex;
height:100vh;
padding:14px;
gap:18px;
}

/* Sidebar */

.sidebar{
width:250px;
background:#fff;
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:left;
padding:18px 0;
box-shadow:
0 0 1px rgba(0,0,0,.05),
0 8px 30px rgba(0,0,0,.04);
}

.logo{
display:flex;
align-items:left;
gap:8px;
margin-top:15px;
margin-bottom:45px;
margin-left:10px;
}
.logo-text{
    font-size:24px;
    font-weight:700;
    align-items:center;
    line-height:1;
    display:flex;
    position:relative;
}
.track{
    color:#00674b !important;
    font-size:28px;
    font-weight:800;
}

.dotcom{
    color:#9CA3AF !important;
    font-size:18px;
    font-weight:400;
}

.logo-circle{
width:58px;
height:58px;
border-radius:50%;
background:#eef4ff;
display:flex;
align-items:center;
justify-content:center;
color:#2457ff;
font-size:28px;
}

.logo h1{
font-size:18px;
font-weight:800;
color:#2457ff;
}

.menu{
display:flex;
flex-direction:column;
gap:8px;
padding:0 12px;
}

.menu button{
    width:100%;
    height:42px;

    display:flex;
    align-items:center;
    justify-content:flex-start;

    gap:10px;

    padding:0 15px;

    border:none;
    border-radius:10px;
    background:transparent;

    cursor:pointer;

    font-size:14px;
    color:#374151;
}

.menu button i{
width:20px;
min-width:20px;
font-size:18px;
text-align:center;
}

.menu button:hover{
background:#f2f6ff;
}

.menu button.active{
background:#DCFCE7;
color:#16A34A;
}

.bottom{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:auto;

    padding:0 12px 30px 12px;
}
.bottom button{
    width:100%;
    height:42px;

    display:flex;
    align-items:center;
    justify-content:flex-start;

    gap:10px;
    padding:0 15px;

    border:none;
    background:transparent;
    border-radius:10px;

    cursor:pointer;

    font-size:14px;
    color:#374151;
}
.bottom button i{
width:20px;
min-width:20px;
font-size:18px;
text-align:center;
}
.bottom button:hover{
    background:#f2f4f7;
    
}

/* Main */

.main{
display:flex;
flex:1;
gap:18px;
}

/* Left Card */

.scanner-card{
width:360px;
background:white;
border-radius:20px;
padding:30px;
box-shadow:
0 0 1px rgba(0,0,0,.05),
0 8px 30px rgba(0,0,0,.04);
}

.section-title{
font-size:17px;
font-weight:700;
color:#101828;
margin-bottom:40px;
}

.scanner-area{
display:flex;
justify-content:center;
margin-top:10px;
margin-bottom:40px;
}

.scan-frame{
width:190px;
height:190px;
position:relative;
}

/* Corners */

.corner{
position:absolute;
width:42px;
height:42px;
border:4px solid #111827;
}

.tl{
left:0;
top:0;
border-right:none;
border-bottom:none;
border-radius:12px 0 0 0;
}

.tr{
right:0;
top:0;
border-left:none;
border-bottom:none;
border-radius:0 12px 0 0;
}

.bl{
left:0;
bottom:0;
border-right:none;
border-top:none;
border-radius:0 0 0 12px;
}

.br{
right:0;
bottom:0;
border-left:none;
border-top:none;
border-radius:0 0 12px 0;
}

/* barcode */

.barcode{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:105px;
height:65px;
background:
repeating-linear-gradient(
90deg,
#d9dce2 0px,
#d9dce2 2px,
transparent 2px,
transparent 4px
);
}

.scan-line{
position:absolute;
width:150px;
height:4px;
background:#16A34A;
left:50%;
top:50%;
transform:translateX(-50%);
box-shadow:0 0 10px #2563eb;
animation:scan 2s linear infinite;
}

@keyframes scan{

0%{
top:60px;
}

50%{
top:120px;
}

100%{
top:60px;
}

}

.scanner-text{
text-align:center;
font-size:15px;
line-height:1.7;
color:#667085;
margin-bottom:30px;
}

.input-group{
display:flex;
flex-direction:column;
gap:12px;
}

input{
height:50px;
border:1px solid #dcdfe4;
border-radius:12px;
padding:0 15px;
font-size:15px;
outline:none;
}

input:focus{
border-color:#2457ff;
}

button.scan-btn{
height:50px;
border:none;
border-radius:12px;
background:#16A34A;
color:white;
font-weight:600;
cursor:pointer;
}

/* Right Card */

.asset-card{
flex:1;
background:white;
border-radius:20px;
padding:30px;
box-shadow:
0 0 1px rgba(0,0,0,.05),
0 8px 30px rgba(0,0,0,.04);
}

.empty-state{
height:85%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.empty-icon{
width:165px;
height:165px;
border-radius:50%;
background:#f3f6ff;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:25px;
}

.empty-icon i{
font-size:72px;
color:#16A34A;
}

.empty-state h2{
font-size:24px;
font-weight:700;
color:#111827;
margin-bottom:14px;
}

.empty-state p{
font-size:16px;
line-height:1.7;
text-align:center;
color:#667085;
}

.asset-info{
display:none;
padding-top:20px;
}

.asset-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
margin-top:20px;
}

.info-box{
background:#f8fafc;
border-radius:14px;
padding:18px;
}

.label{
font-size:13px;
color:#667085;
margin-bottom:6px;
}

.value{
font-size:18px;
font-weight:700;
color:#101828;
}

</style>
</head>
<body>

<div class="wrapper">

<div class="sidebar">
<div class="logo">

   <img src="{{ asset('images/TI.png') }}" width="70" height="70">

    <div class="logo-divider"></div>

    <div class="logo-text">
    <span class="track">TrackIt</span>
    <span class="dotcom">.com</span>
</div>


</div>

<div class="menu">
<button onclick="window.location.href='displaypanel.html'">
    <i class="fa-solid fa-house"></i>
    <span>Track</span>
</button>

<button onclick="window.location.href='properties.html'">
    <i class="fa-solid fa-chart-column"></i>
    <span>Properties</span>
</button>

<button onclick="window.location.href='cleaning.html'">
    <i class="fa-solid fa-screwdriver-wrench"></i>
<span>Cleaning</span>
</button>
<button onclick="window.location.href='accounts.html'">
    <i class="fa-regular fa-user"></i>
<span>Accounts</span>
</button>

<button onclick="window.location.href='garagesale.html'">
    <i class="fa-solid fa-box"></i>
<span>Garage Sale</span>
</button>

<button class="active">
    <i class="fa-regular fa-clock"></i>
<span>Logs</span>
</button>
</div>

<div class="bottom">

    <button>
        <i class="fa-regular fa-circle-user"></i>
        <span>Profile</span>
    </button>

    <button>
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Logout</span>
    </button>

</div>

</div>

<div class="main">

    <div class="asset-card">

        <div class="properties-header">

    <div>
        <h1>Logs</h1>
        <p>Manage all log records.</p>
    </div>

</div>

        <div class="empty-state">

            <div class="empty-icon">
                <i class="fa-solid fa-building"></i>
            </div>

            <h2>
                No Logs Information
            </h2>

            <p>
                Log records will be displayed here.
            </p>

        </div>

    </div>

</div>

</body>
</html>
